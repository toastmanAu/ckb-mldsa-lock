[build]
target = "riscv64imac-unknown-none-elf"

[target.riscv64imac-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-s",
    "-C", "link-arg=--gc-sections",
    "-C", "link-arg=-T",
    "-C", "link-arg=ckb-contract.ld",
]

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
