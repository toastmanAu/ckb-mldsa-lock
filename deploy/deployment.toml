# CKB deploy config for the ckb-mldsa-lock project.
#
# Deployed so far (session 4, 2026-04-08):
#   - mldsa44-lock-v2, mldsa65-lock-v2, mldsa87-lock-v2
#     in tx 0xb1a05b5000cecdcb51a1518e96cb13d81a1b28cea21d861a64081430cb35ae88
#
# Pending (this deploy, session 7):
#   - falcon512-lock-v2, falcon1024-lock-v2
#     from contracts/falcon-lock-v2/
#
# NOTE: the v1 C `mldsa-lock` cell stays deployed on testnet at its
# original tx_hash 0xba4a6560... under an account whose password was lost.
# Do NOT list it here — ckb-cli would try to "redeploy" it, needing a
# signature we can't produce. It's immutable code on-chain and keeps
# working for any consumers already referencing it.

[[cells]]
name = "mldsa44-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa44-lock-v2" }

[[cells]]
name = "mldsa65-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa65-lock-v2" }

[[cells]]
name = "mldsa87-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa87-lock-v2" }

[[cells]]
name = "falcon512-lock-v2"
enable_type_id = true
location = { file = "contracts/falcon-lock-v2/target/riscv64imac-unknown-none-elf/release/falcon512-lock-v2" }

[[cells]]
name = "falcon1024-lock-v2"
enable_type_id = true
location = { file = "contracts/falcon-lock-v2/target/riscv64imac-unknown-none-elf/release/falcon1024-lock-v2" }

[lock]
# Same deploy owner as the ML-DSA deploy. Migration state in
# deploy/migrations/ tracks the mldsa cells as already-deployed, so
# ckb-cli will skip them and only emit a new tx for the two falcon
# cells.
code_hash = "0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8"
args = "0xa776bf02d19cafa3749d906cc2c9ab1cf1e80ff7"
hash_type = "type"
