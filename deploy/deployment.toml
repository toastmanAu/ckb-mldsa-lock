# CKB deploy config for the ckb-mldsa-lock project.
#
# Deployed so far (session 4, 2026-04-08):
#   - mldsa{44,65,87}-lock-v2 (fips204 backend)
#     in tx 0xb1a05b5000cecdcb51a1518e96cb13d81a1b28cea21d861a64081430cb35ae88
#   - falcon{512,1024}-lock-v2 (original slow build)
#     in tx 0x0e15396cff81e32b8abbcb37f9cbdce87b7edc60fc4150220c081bf85822bbc0
#
# Session 9 (2026-04-09):
#   - NEW: mldsa{44,65,87}-lock-v2-rust (RustCrypto ml-dsa backend).
#   - UPGRADE: falcon{512,1024}-lock-v2 rebuilt with opt-level=3 + fat-lto.
#
# Session 10 (2026-04-10):
#   - UPGRADE: all 5 Rust cells rebuilt with overflow-checks=true per
#     core-dev review. Profile-wide overflow-checks=false also removed
#     checks from non-NTT code (witness parsing, index math) where
#     silent wraps on attacker input are a soundness risk. Cycle cost
#     +6-12% across variants; acceptable for on-chain verifiers.
#   - Deploy tx: 0x1074b1ac79213c22b5e32a0fde44a858a47f9575c9f54006a1deb80d32070cb1
#   - Smoke-spent all 5 variants on testnet.
#
# NOTE: the v1 C `mldsa-lock` cell stays deployed on testnet at its
# original tx_hash 0xba4a6560... under an account whose password was lost.
# Do NOT list it here — ckb-cli would try to "redeploy" it, needing a
# signature we can't produce. It's immutable code on-chain and keeps
# working for any consumers already referencing it.

[[cells]]
name = "mldsa44-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa44-lock-v2" }

[[cells]]
name = "mldsa65-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa65-lock-v2" }

[[cells]]
name = "mldsa87-lock-v2"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2/target/riscv64imac-unknown-none-elf/release/mldsa87-lock-v2" }

[[cells]]
name = "falcon512-lock-v2"
enable_type_id = true
location = { file = "contracts/falcon-lock-v2/target/riscv64imac-unknown-none-elf/release/falcon512-lock-v2" }

[[cells]]
name = "falcon1024-lock-v2"
enable_type_id = true
location = { file = "contracts/falcon-lock-v2/target/riscv64imac-unknown-none-elf/release/falcon1024-lock-v2" }

# ── v2-rust (RustCrypto ml-dsa) — fresh deploys, new code_hashes ─────────
#
# Each bin is built with a separate cargo invocation gating on its
# `variant-XX` feature so LTO + cfg together strip the unused variants.
# See contracts/mldsa-lock-v2-rust/Cargo.toml for the build recipe.

[[cells]]
name = "mldsa44-lock-v2-rust"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2-rust/target/riscv64imac-unknown-none-elf/release/mldsa44-lock-v2-rust" }

[[cells]]
name = "mldsa65-lock-v2-rust"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2-rust/target/riscv64imac-unknown-none-elf/release/mldsa65-lock-v2-rust" }

[[cells]]
name = "mldsa87-lock-v2-rust"
enable_type_id = true
location = { file = "contracts/mldsa-lock-v2-rust/target/riscv64imac-unknown-none-elf/release/mldsa87-lock-v2-rust" }

[lock]
# Same deploy owner as the ML-DSA deploy. Migration state in
# deploy/migrations/ tracks the mldsa cells as already-deployed, so
# ckb-cli will skip them and only emit a new tx for the two falcon
# cells.
code_hash = "0x9bd7e06f3ecf4be0f2fcd2188b23f1b9fcc88e5d4b65a8637b17723bbda3cce8"
args = "0xa776bf02d19cafa3749d906cc2c9ab1cf1e80ff7"
hash_type = "type"
